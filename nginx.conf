events {
    worker_connections 1024;
}

http {
    upstream vetrinaria {
        server web:3000;
    }

    server {
        listen 80;
        server_name vetrinaria.app www.vetrinaria.app;
        server_tokens off;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl http2;
        server_name vetrinaria.app www.vetrinaria.app;
        server_tokens off;

        ssl_certificate /etc/letsencrypt/live/vetrinaria.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/vetrinaria.app/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header Strict-Transport-Security "max-age=63072000" always;

        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

        location / {
            proxy_pass http://vetrinaria;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_buffering off;
            proxy_read_timeout 60s;
        }

        location /_next/static {
            proxy_cache_valid 200 365d;
            add_header Cache-Control "public, immutable";
            proxy_pass http://vetrinaria;
        }

        location /api/health {
            access_log off;
            proxy_pass http://vetrinaria;
        }
    }
}
